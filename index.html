<!DOCTYPE html>
<meta charset="UTF-8">
<html>
<head>
    <title>NomNom – The Smart ChefBot 🍲</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">NomNom</div>
        <div class="chat-messages d-flex flex-column" id="chat-messages"></div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="How can I help you today?" />
            <button id="sendBtn" class="icon-button" disabled><i class="fas fa-paper-plane"></i></button>
            <button class="icon-button" onclick="startVoice()"><i class="fas fa-microphone"></i></button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
